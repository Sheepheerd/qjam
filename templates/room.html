<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Stream Aggregator</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
  </head>
  <body class="container">

    <h1>Audio Aggregator</h1>



    <label for="search">Search YouTube or Paste URL:</label>

    <div class="search-container" style="position: relative;">

      <input type="text" 
	id="url-input"
	name="query" 
	placeholder="Search song..." 
	autocomplete="off"
	hx-post="/search" 
	hx-trigger="keyup changed delay:500ms" 
	hx-target="#search-results">

      <ul id="search-results" 
	role="listbox" 
	style="position: absolute; 
	top: 100%; 
	left: 0; 
	right: 0; 
	z-index: 100; 
	background: #1f2937; 
	border: 1px solid #374151; 
	list-style: none; 
	padding: 0; 
	margin: 0;
	max-height: 200px; 
	overflow-y: auto;">
      </ul>

    </div>

    <form hx-post="/{{ room.session_id }}/queue" hx-target="#input-wrapper">
      <input type="hidden" name="url" id="hidden-submission-url">
      <button type="submit" onclick="document.getElementById('hidden-submission-url').value = document.getElementById('url-input').value">
	Queue Selected Song
      </button>
    </form>

    <h3>Current Queue</h3>

    <ul id="queue-list"
      style="max-height: 300px; overflow-y: auto; list-style: none; padding: 0;">
    </ul>

    <form hx-post="/{{ room.session_id }}/queue" hx-target="#input-wrapper" hx-swap="innerHTML">
      <div class="grid">

	<div id="input-wrapper">
	</div>

      </div>
    </form>


    <form hx-post="/play" hx-target="#player-container" hx-swap="innerHTML">
      <button type="submit">Play Top of Queue</button>
    </form>

    <div id="player-container">
    </div>

    <script>
    const roomId = "{{ room.session_id }}";
    const queueList = document.getElementById("queue-list");

    const socket = new WebSocket(`ws://${window.location.host}/ws/${roomId}`);

    socket.onmessage = (event) => {
      const queue = JSON.parse(event.data);
      renderQueue(queue);
    };

function renderQueue(queue) {
  queueList.innerHTML = "";

  queue.forEach(item => {
    const li = document.createElement("li");
    
    // FIX: Apply styles using JavaScript, not raw HTML
    li.style.cssText = "display: flex; gap: 10px; padding: 10px; border-bottom: 1px solid #333; align-items: center;";
    
    li.dataset.id = item.id;

    // Use a template literal to build the inner HTML (Image is here)
    li.innerHTML = `
      <img src="${item.album_art || 'https://placehold.co/60'}" 
           alt="Cover"
           style="width: 60px; height: 60px; object-fit: cover; border-radius: 5px; flex-shrink: 0; margin-right: 10px;"/>
      
      <div style="min-width: 0;">
        <div style="font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
          ${item.title}
        </div>
        <div style="font-size: 0.8em; color: #888;">
          ${item.artist ?? "Unknown Artist"}
        </div>
        <div style="font-size: 0.7em; color: #555;">
          Added by: ${item.added_by?.name ?? "System"}
        </div>
      </div>
    `;

    queueList.appendChild(li);
  });
}
    Sortable.create(queueList, {
      animation: 150,
      onEnd: () => {
	const newOrder = Array.from(queueList.children).map(
	  li => li.dataset.id
	);

	socket.send(JSON.stringify({
	  type: "reorder",
	  order: newOrder
	}));
      }
    });
    </script>


  </body>
</html>
